<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Popup Ad</title>

<style>

body{
margin:0;
height:2000px;
font-family:sans-serif;
}

/* 背景 */
#ad-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

/* 背景クリック */
#bg-click{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* GIF中央 */
#ad-box{
position:relative;
z-index:2;
}

/* GIF */
#ad-gif{
width:320px;
max-width:80vw;
}

/* バツ */
#close-ad{
position:absolute;
top:-2px;
right:-2px;
font-size:5px;
background:white;
border-radius:50%;
width:6px;
height:6px;
line-height:6px;
text-align:center;
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<h1>サイトのコンテンツ</h1>
<p>ここにサイトの内容を書きます。</p>

<div id="ad-overlay">

<div id="bg-click"></div>

<div id="ad-box">

<div id="close-ad">×</div>

<img id="ad-gif"
src="https://nonstoperogazou.com/wp-content/uploads/2025/01/nsegz10i21.gif">

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const overlay = document.getElementById("ad-overlay");
const gif = document.getElementById("ad-gif");
const bg = document.getElementById("bg-click");

/* ポップアップ表示 */
overlay.style.display="flex";

/* GIFクリック */
gif.addEventListener("click",function(e){

e.stopPropagation();
location.href="player.html";

});

/* 背景クリック */
bg.addEventListener("click",function(){

location.href="image.html";

});

});

</script>

</body>
</html>
